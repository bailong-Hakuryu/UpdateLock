name: Build & Release UpdateLock

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build-msvc:
    name: Build with MSVC (Windows x64)
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Executable
        run: cmake --build build --config Release

      - name: Package Release Files
        run: |
          mkdir release_pkg
          copy build\Release\UpdateLock.exe release_pkg\
          copy rules.json release_pkg\
          copy UpdateLock.bat release_pkg\
          copy UpdateLock.ps1 release_pkg\
          copy README.md release_pkg\
          powershell Compress-Archive -Path release_pkg\* -DestinationPath UpdateLock-v1.1.0-x64.zip

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UpdateLock-MSVC-x64
          path: UpdateLock-v1.1.0-x64.zip

  create-release:
    name: Create GitHub Release
    needs: build-msvc
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: UpdateLock-MSVC-x64

      - name: Release to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: UpdateLock-v1.1.0-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
